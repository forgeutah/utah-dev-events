name: Weekly Meetup Scraper Smoke Test

on:
  schedule:
    - cron: "0 9 * * 1"  # Monday 09:00 UTC
  workflow_dispatch:

env:
  DEBUG: "false"  # prevents playwright_utils.py from launching a headed browser

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions/scraping-events

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "functions/scraping-events/uv.lock"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run smoke tests (group URL)
        env:
          SMOKE_TEST_URL: ${{ secrets.SMOKE_TEST_GROUP_URL }}
        run: uv run pytest tests/smoke/ -v --tb=short

      - name: Run smoke tests (event URL)
        env:
          SMOKE_TEST_URL: ${{ secrets.SMOKE_TEST_EVENT_URL }}
        run: uv run pytest tests/smoke/ -v --tb=short

  claude-fix:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: ${{ failure() }}
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: functions/scraping-events

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "functions/scraping-events/uv.lock"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude fix agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMOKE_TEST_URL: ${{ secrets.SMOKE_TEST_GROUP_URL }}
          DEBUG: "false"
        working-directory: ${{ github.workspace }}
        run: |
          claude --bare -p "$(cat functions/scraping-events/scripts/meetup_fix_prompt.txt)" \
            --allowedTools "Bash,Read,Edit,Write" \
            --max-turns 20 \
            --max-budget-usd 5.00

      - name: Check for unexpected file modifications
        working-directory: ${{ github.workspace }}
        run: |
          changed=$(git diff --name-only)
          unexpected=$(echo "$changed" | grep -v '^functions/scraping-events/src/scraping_events/scrape_meetup\.py$' || true)
          if [ -n "$unexpected" ]; then
            echo "::warning::Agent modified files outside scrape_meetup.py (not committed):"
            echo "$unexpected"
          fi

      - uses: peter-evans/create-pull-request@v7
        with:
          branch: automated/meetup-scraper-fix
          delete-branch: true
          add-paths: functions/scraping-events/src/scraping_events/scrape_meetup.py
          title: "fix(scraping): automated Meetup selector fix (run ${{ github.run_id }})"
          body: |
            The weekly Meetup scraper smoke test failed and the Claude fix agent updated `scrape_meetup.py` with corrected selectors.

            **Failing workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Review the diff carefully before merging — the agent has write access during the fix step and `add-paths` is the safety net limiting what gets committed.
          commit-message: "fix(scraping): update Meetup selectors (automated fix, run ${{ github.run_id }})"
